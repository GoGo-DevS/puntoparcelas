{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso panel — Punto Parcelas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --gold:#D4AF37; --bg:#0D0D0D; --surface:#141414; --border:rgba(212,175,55,.15); }
    body { background:var(--bg); color:#F0EDE4; font-family:'Roboto',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-wrap { width:100%; max-width:400px; padding:1rem; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2.5rem 2.2rem; }
    .logo { text-align:center; margin-bottom:2rem; }
    .logo img { height:72px; width:auto; }
    .form-control { background:#1E1E1E!important; border:1px solid var(--border)!important; color:#F0EDE4!important; border-radius:8px; padding:.8rem 1rem; }
    .form-control:focus { border-color:var(--gold)!important; box-shadow:0 0 0 3px rgba(212,175,55,.1)!important; }
    .form-control::placeholder { color:rgba(240,237,228,.35); }
    .btn-login { background:var(--gold); color:#0D0D0D; font-family:'Montserrat',sans-serif; font-weight:800; font-size:.9rem; letter-spacing:.05em; text-transform:uppercase; border:none; border-radius:8px; padding:.8rem; width:100%; cursor:pointer; transition:background .18s; }
    .btn-login:hover { background:#B8941E; }
    .err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); color:#EF4444; border-radius:8px; padding:.75rem 1rem; font-size:.85rem; margin-bottom:1rem; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo"><img src="{% static 'img/logo-isotipo.png' %}" alt="Punto Parcelas"></div>
    <p style="text-align:center; color:rgba(240,237,228,.5); font-size:.85rem; margin-bottom:1.8rem;">Panel de administración</p>

    {% if form.errors %}
    <div class="err"><i class="bi bi-exclamation-triangle me-2"></i>Usuario o contraseña incorrectos.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        {{ form.username }}
      </div>
      <div class="mb-4">
        {{ form.password }}
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
    <div class="text-center mt-3">
      <a href="/" style="color:rgba(212,175,55,.6); font-size:.8rem; text-decoration:none;">← Volver al sitio</a>
    </div>
  </div>
</div>
</body>
</html>
