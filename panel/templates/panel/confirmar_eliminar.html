{% extends "panel/base_panel.html" %}
{% block title %}{{ titulo }} — Panel{% endblock %}
{% block topbar_title %}{{ titulo }}{% endblock %}

{% block content %}
<div style="max-width:420px; margin:0 auto;">
  <div class="kpi-card" style="text-align:center; padding:3rem 2rem;">
    <i class="bi bi-exclamation-triangle-fill" style="font-size:3rem; color:#EF4444; display:block; margin-bottom:1rem;"></i>
    <h3>{{ titulo }}</h3>
    <p style="color:var(--pp-muted); margin:1rem 0 2rem;">Esta acción no se puede deshacer.</p>
    <div class="d-flex gap-3 justify-content-center">
      <a href="{{ volver_url }}" class="btn-pp-ghost">Cancelar</a>
      <form method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn-danger-ghost" style="padding:.6rem 1.4rem;">
          <i class="bi bi-trash3 me-2"></i>Confirmar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
